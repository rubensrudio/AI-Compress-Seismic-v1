# =============================================================================
# Release Workflow — AI-Compress-Seismic-v1
#
# Triggers: push of a tag matching v* (e.g. v1.0.0, v1.1.0-rc1).
#
# Jobs (in order):
#   1. ci        — re-runs the full CI suite via workflow_call (reuse ci.yml)
#   2. benchmark — executes JMH harness (sdc-bench) and generates latest.json
#   3. publish   — publishes latest.json as a GitHub Release asset
#   4. docker    — builds sdc-ui Docker image and pushes to halotechlabs.com
#
# Required GitHub secrets:
#   HALOTECHLABS_DEPLOY_KEY
#       SSH private key (RSA or Ed25519) authorised to push to the Docker
#       registry / deploy target at halotechlabs.com.  The key must be stored
#       as a repository secret in GitHub (Settings → Secrets → Actions).
#       The corresponding public key must be configured on the remote host
#       (authorized_keys or registry credentials).
#
#   HALOTECHLABS_REGISTRY (optional — default: registry.halotechlabs.com)
#       FQDN of the private Docker registry.  Override if the registry address
#       changes without a code change.
#
# Dependency cycle workaround:
#   Same two-step bootstrap as ci.yml — see that file for the full explanation.
#
# Benchmark artefact path:
#   sdc-bench produces the JMH JSON result at:
#     sdc-bench/target/jmh-results/latest.json
#   The BenchmarkReporter class (com.sdc.bench.BenchmarkReporter) also copies
#   the file to that location after the JMH run.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 — Re-run the full CI suite (reuse ci.yml via workflow_call).
  # The ci.yml workflow must declare `workflow_call` as a trigger for this to
  # work.  If ci.yml is updated to add workflow_call, this job picks it up
  # automatically.
  # NOTE: Because this repository is a portfolio project without a live GitHub
  # remote, this workflow_call reference is illustrative.  When a remote is
  # added, ensure ci.yml declares:
  #   on:
  #     workflow_call: {}
  # ---------------------------------------------------------------------------
  ci:
    name: CI Suite (reuse ci.yml)
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # Job 2 — JMH Benchmark (sdc-bench)
  # Runs after CI passes.  Generates sdc-bench/target/jmh-results/latest.json.
  # ---------------------------------------------------------------------------
  benchmark:
    name: JMH Benchmark Gate
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      # Bootstrap: install sdc-fixtures without tests (dependency cycle fix).
      - name: Bootstrap — install sdc-fixtures (skip tests)
        run: |
          mvn install \
            --no-transfer-progress \
            -pl sdc-fixtures \
            -DskipTests

      # Install sdc-core and sdc-ai before sdc-bench (they are dependencies).
      - name: Install sdc-core and sdc-ai (skip tests — already ran in ci job)
        run: |
          mvn install \
            --no-transfer-progress \
            -pl sdc-core,sdc-ai \
            -DskipTests

      # Run sdc-bench via mvn verify.  The Maven Exec plugin in sdc-bench/pom.xml
      # invokes the JMH runner (BenchmarkRunner.main) which writes
      # target/jmh-results/latest.json via BenchmarkReporter.
      # -DskipTests skips Surefire; the actual benchmark runs via exec:exec (fork via uber-JAR).
      - name: Run JMH benchmarks (sdc-bench)
        run: |
          mvn verify \
            --no-transfer-progress \
            -pl sdc-bench

      # Verify that latest.json was produced.
      - name: Verify latest.json exists
        run: |
          REPORT=sdc-bench/target/jmh-results/latest.json
          if [ ! -f "${REPORT}" ]; then
            echo "ERROR: ${REPORT} was not generated by sdc-bench."
            exit 1
          fi
          echo "=== latest.json ==="
          cat "${REPORT}"

      # Upload latest.json as a workflow artifact so the publish job can
      # retrieve it without re-running the benchmark.
      - name: Upload latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: jmh-latest
          path: sdc-bench/target/jmh-results/latest.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3 — Publish latest.json as a GitHub Release asset
  # ---------------------------------------------------------------------------
  publish:
    name: Publish Release Asset (latest.json)
    needs: benchmark
    runs-on: ubuntu-latest

    # Needs write permission to create/update releases and upload assets.
    permissions:
      contents: write

    steps:
      - name: Download latest.json artifact
        uses: actions/download-artifact@v4
        with:
          name: jmh-latest
          path: release-assets/

      # Create (or update) the GitHub Release for this tag, then upload
      # latest.json as a release asset.
      - name: Upload latest.json to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/latest.json
          # If the release was created manually via the GitHub UI, this step
          # adds the asset to the existing release.  If the release does not
          # exist yet, it is created automatically.
          fail_on_unmatched_files: true
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Job 4 — Build and push sdc-ui Docker image to halotechlabs.com
  #
  # Deploy strategy: SSH tunnel via Docker context (no docker/login-action).
  # docker/login-action expects registry credentials (username + password);
  # HALOTECHLABS_DEPLOY_KEY is an SSH private key, not a registry password,
  # so using it as `password:` is semantically wrong and would be rejected by
  # the registry.  Instead we:
  #   1. Load the SSH key into ssh-agent via webfactory/ssh-agent.
  #   2. Create a Docker context that tunnels all Docker API calls over SSH.
  #   3. Build locally with docker/build-push-action, then push via the SSH
  #      context so credentials never leave the SSH layer.
  #
  # Required secrets:
  #   HALOTECHLABS_DEPLOY_KEY — SSH private key (RSA or Ed25519, no passphrase)
  #                             authorised for deploy@halotechlabs.com
  #                             (i.e. present in authorized_keys on the host).
  #
  # Optional secrets:
  #   HALOTECHLABS_REGISTRY   — FQDN of the Docker registry
  #                             (default: registry.halotechlabs.com)
  # ---------------------------------------------------------------------------
  docker:
    name: Build & Push sdc-ui Docker image
    # B3 fix: docker only runs after both ci AND benchmark succeed, so that
    # latest.json is guaranteed to exist before the image is published.
    needs: [ci, benchmark]
    runs-on: ubuntu-latest

    env:
      # Use the secret override if set, otherwise fall back to the default FQDN.
      REGISTRY: ${{ secrets.HALOTECHLABS_REGISTRY || 'registry.halotechlabs.com' }}
      IMAGE_NAME: sdc-ui
      IMAGE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Load the SSH private key into the agent.
      # webfactory/ssh-agent sets SSH_AUTH_SOCK so subsequent ssh and docker
      # commands can use the key transparently.
      - name: Load SSH deploy key (webfactory/ssh-agent)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          # Required secret: SSH private key authorised for deploy@halotechlabs.com
          ssh-private-key: ${{ secrets.HALOTECHLABS_DEPLOY_KEY }}

      # Step 2: Create a Docker context that routes the Docker daemon API over
      # SSH.  This avoids registry password authentication entirely — the SSH
      # key loaded above authenticates the tunnel.
      - name: Create remote Docker context via SSH
        run: |
          docker context create remote \
            --docker "host=ssh://deploy@halotechlabs.com"

      - name: Set up Docker Buildx (using remote context)
        uses: docker/setup-buildx-action@v3
        with:
          endpoint: remote

      # Step 3: Build the sdc-ui image locally and push it to the remote
      # registry through the SSH tunnel.  No registry login is required because
      # the remote Docker daemon performs the push from inside the host network.
      #
      # Dockerfile stages:
      #   Stage 1 (builder): node:18-alpine — npm ci + ng build --configuration=production
      #   Stage 2 (serve):   nginx:alpine   — serves the Angular app under
      #                                       /demo/seismic-compressor
      - name: Build and push Docker image via SSH context
        uses: docker/build-push-action@v5
        with:
          context: sdc-ui
          file: sdc-ui/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke-test: verify the image was pushed by pulling its manifest.
      - name: Verify image pushed successfully
        run: |
          DOCKER_HOST=ssh://deploy@halotechlabs.com \
          docker manifest inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            && echo "PASS: image manifest found." \
            || { echo "ERROR: image manifest not found after push."; exit 1; }
