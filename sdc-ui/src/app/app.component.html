<mat-toolbar color="primary" class="app-toolbar" role="banner">
  <a
    routerLink="/"
    class="app-toolbar__title"
    aria-label="AI-Compress Seismic Compressor home">
    AI-Compress Seismic Compressor
  </a>

  <span class="app-toolbar__spacer"></span>

  <nav class="app-toolbar__nav" aria-label="Main navigation">
    <a
      mat-button
      routerLink="/"
      routerLinkActive="app-toolbar__nav-link--active"
      [routerLinkActiveOptions]="{ exact: true }"
      aria-label="Home — File Inspector and Compression Preview">
      <mat-icon aria-hidden="true">home</mat-icon>
      Home
    </a>
    <a
      mat-button
      routerLink="/benchmark"
      routerLinkActive="app-toolbar__nav-link--active"
      aria-label="Benchmark results">
      <mat-icon aria-hidden="true">speed</mat-icon>
      Benchmark
    </a>
  </nav>

  <a
    href="https://halotechlabs.com"
    target="_blank"
    rel="noopener noreferrer"
    mat-icon-button
    class="app-toolbar__halotechlabs-link"
    aria-label="Visit halotechlabs.com (opens in new tab)">
    <mat-icon aria-hidden="true">open_in_new</mat-icon>
  </a>
</mat-toolbar>

<main class="app-main" role="main">
  <router-outlet></router-outlet>
</main>
